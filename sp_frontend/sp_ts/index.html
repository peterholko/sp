<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Perilous</title>
  <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
  <script>
    WebFont.load({
      google: {
        families: ['Alegreya']
      }
    });

    document.addEventListener('dragstart', function (e) {
      e.preventDefault();
    });
  </script>

</head>

<body style="background-color: black">
  <div id="root"></div>
</body>
<script>
  (function () {
    var w = window.screen.width, h = window.screen.height;
    // iPad Pro (1366x1024) keeps mobile bundle but uses scaled viewport.
    var isIpadPro = (w === 1366 && h === 1024);
    var isMobile = (w <= 1024) || isIpadPro;
    if (!isMobile) window.__SP_DESKTOP__ = true;
    if (isIpadPro) {
      var v = document.querySelector("meta[name=viewport]");
      v.setAttribute('content', 'width=device-width, initial-scale=1.333, minimum-scale=1.333, maximum-scale=1.333, user-scalable=0');
    }
    var s = document.createElement("script");
    s.src = isMobile ? "/static/sp2.mobile.js" : "/static/sp2.desktop.js";
    document.head.appendChild(s);
  })();
</script>

</html>
